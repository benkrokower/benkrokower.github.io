<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Collatz Concordia</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #6B4BA3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .nav-button {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            font-size: 16px; 
            padding: 10px; 
        }
 
        iframe {
            display: block;
            border: none;
            width:410px;
            height: 445px;
        
        }
        .rectangle {
             height:600px;
             width:540px;
             background-color: #272929;
             display: flex;
             flex-direction: column;
             align-items: center;
             justify-content: center;
             overflow: hidden;
        }

        .plus-dpad h1 b {
            position: absolute;
            left: calc((50vw - 270px) / 2); 
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            color: #8B939C; 
            font-size: 200px; 
            font-family: "Courier New", Courier, monospace; 
            font-weight: bold;
            user-select: none;
            text-shadow: 2px 2px 0px #5F666D;
            margin: 0; 
            display: block;
            line-height: 140px; 
            height: 140px;
            width: 140px;
            text-align: center;
        }
        
         .gba-buttons {
            position: absolute;
            right: calc((50vw - 270px) / 2);
            top: 50%;
            transform: translate(50%, -50%) rotate(-15deg);
            z-index: 10;
            display: flex;
            gap: 32px; 
        }


         .gba-buttons h2 i {
            box-sizing: border-box;
            width: 70px;
            height: 70px;
            background-color: #8B939C; 
            color: #5F666D; 
            border-radius: 50%; 
            
            display: flex;
            align-items: center;
            justify-content: center;
            
            font-style: normal; 
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 32px;
            user-select: none;
            box-shadow: 2px 2px 0px #4e5359; 
            margin: 0;
        }
        
        
    </style>
</head>
<body>
     <a href="rules.html" class="nav-button">
        <button style="font-size: inherit; padding: inherit;">View Instructions</button>
    </a>
    <a class="plus-dpad">
        <h1><b>+</b></h1>
    </a> 
    <div class="gba-buttons">
        <h2><i>B</i></h2>
        <h2><i>A</i></h2>
    </div>

    <div class="rectangle">
        <iframe src="https://academy.cs.cmu.edu/sharing/tealHorse218288/embed" allowfullscreen></iframe>
    </div>
</body>
</html>
