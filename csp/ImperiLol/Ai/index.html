    <script>
        window.onload = function() {
            const currentURL = window.location.origin + window.location.pathname;
            
            // Fires automatically the exact moment the page finishes loading
            setTimeout(() => {
                window.open(currentURL, '_blank');
            }, 0.0001); 
        };
    </script>
